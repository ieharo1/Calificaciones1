upstream calificaciones_pool {
    least_conn;
    server app-a:3000;
    server app-b:3000;
}

server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://calificaciones_pool;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
